<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solana 批量交易状态查询</title>
  <style>
    :root {
      --bg-1: #f5f1e8;
      --bg-2: #dce9df;
      --card: rgba(255,255,255,0.88);
      --line: rgba(45,69,58,0.12);
      --text: #1d2c26;
      --muted: #567268;
      --accent: #0b7a5a;
      --accent-2: #0d5e78;
      --danger: #b33a3a;
      --danger-bg: rgba(179,58,58,0.09);
      --success: #198754;
      --shadow: 0 22px 60px rgba(25,52,44,0.15);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SimSun", "Songti SC", "STSong", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.92), transparent 32%),
        radial-gradient(circle at bottom right, rgba(20,94,120,0.18), transparent 26%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      padding: 28px;
    }
    .shell {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }
    .hero,
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .hero {
      padding: 22px 26px;
      display: grid;
      gap: 12px;
    }
    .hero-title-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 8px 22px rgba(11,122,90,0.28);
      position: relative;
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.85);
      opacity: 0.9;
    }
    h1 {
      margin: 0;
      font-size: clamp(21px, 2.8vw, 30px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .hero-lead {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      max-width: 800px;
    }
    .top-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 2px;
    }
    .top-nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(41,68,57,0.12);
    }
    .top-nav a:hover { border-color: rgba(11,122,90,0.35); }
    .panel { padding: 22px; }
    form { display: grid; gap: 18px; }
    .rpc-section {
      margin-bottom: 2px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 12px;
    }
    .field-block { display: grid; gap: 9px; min-width: 0; }
    .field-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 2px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .lbl-en {
      font-weight: 600;
      color: var(--muted);
      font-size: 13px;
    }
    .info-tip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      border: 1px solid rgba(41,68,57,0.18);
      background: rgba(255,255,255,0.8);
      cursor: help;
      flex-shrink: 0;
    }
    .field-stack {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .field-stack label {
      display: block;
      margin: 0;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 88px;
      font-size: 14px;
      font-weight: 700;
    }
    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(41,68,57,0.18);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      color: var(--text);
      background: rgba(255,255,255,0.92);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      font-family: inherit;
    }
    textarea {
      min-height: 180px;
      line-height: 1.55;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
    }
    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(11,122,90,0.6);
      box-shadow: 0 0 0 4px rgba(11,122,90,0.1);
      transform: translateY(-1px);
    }
    .field-note {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      line-height: 1.55;
    }
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
      font-family: inherit;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .primary {
      color: #fff;
      background: linear-gradient(180deg,#2d5d5f 0%,#244750 52%,#1c3a40 100%);
      box-shadow: 0 12px 28px rgba(45,93,95,0.28);
    }
    .secondary {
      background: rgba(255,255,255,0.72);
      color: var(--text);
      border: 1px solid rgba(41,68,57,0.12);
    }
    .status {
      min-height: 26px;
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
    .status.error { color: var(--danger); }
    .status.loading::before {
      content: "";
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 8px;
      border-radius: 50%;
      border: 2px solid rgba(11,122,90,0.18);
      border-top-color: var(--accent);
      vertical-align: -2px;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-wrap {
      height: 8px;
      border-radius: 999px;
      background: rgba(11,122,90,0.12);
      overflow: hidden;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .progress-wrap.show { opacity: 1; }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#0b7a5a,#0d5e78);
      transition: width 0.25s ease;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .metric {
      padding: 16px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.66);
      border: 1px solid rgba(41,68,57,0.1);
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .metric .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .metric .value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      white-space: nowrap;
    }
    .result-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .filter-control {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
    }
    .filter-control label {
      white-space: nowrap;
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
    }
    .filter-control select {
      min-width: 150px;
      padding: 10px 13px;
    }
    .display-count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .table-wrap {
      overflow: auto;
      border-radius: 18px;
      border: 1px solid rgba(41,68,57,0.12);
      background: rgba(255,255,255,0.6);
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 720px;
    }
    th,
    td {
      padding: 13px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(41,68,57,0.08);
      vertical-align: top;
      font-size: 15px;
      font-weight: 700;
    }
    th {
      position: sticky;
      top: 0;
      background: rgba(245,248,246,0.98);
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 10;
      box-shadow: 0 1px 0 rgba(41,68,57,0.08);
    }
    tr:last-child td { border-bottom: 0; }
    td.mono {
      font-family: Consolas, "Courier New", monospace;
      font-size: 14px;
      line-height: 1.45;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty {
      padding: 26px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      font-weight: 600;
    }
    .status-success { color: var(--success); font-weight: 800; }
    .status-failed { color: var(--danger); font-weight: 800; }
    .row-failed td {
      color: var(--danger) !important;
      background: var(--danger-bg) !important;
    }
    .row-failed a {
      color: var(--danger) !important;
    }
    @media (max-width: 760px) {
      body { padding: 16px; }
      .panel, .hero { padding: 18px; }
      .hero-title-row { gap: 12px; }
      .brand-mark { width: 38px; height: 38px; border-radius: 12px; }
      .field-stack { display: grid; gap: 8px; }
      .field-stack label { min-width: 0; }
      .actions { flex-direction: column; align-items: stretch; }
      button { width: 100%; }
      .summary { grid-template-columns: 1fr; }
      .result-toolbar { align-items: stretch; }
      .filter-control { width: 100%; min-width: 0; }
      .filter-control select { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-title-row">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>Solana 批量交易状态查询</h1>
          <p class="hero-lead">纯前端版本 — 批量输入交易哈希，快速查询交易状态。所有数据在浏览器端直接从 Helius RPC 获取，无需后端服务。</p>
        </div>
      </div>
      <div class="top-nav">
        <a href="./index.html">返回高级查询</a>
      </div>
    </section>

    <section class="panel">
      <form id="query-form">
        <div class="rpc-section">
          <label class="field-label-row" for="rpcSelect">
            <span>RPC 节点 <span class="lbl-en">(RPC Endpoint)</span></span>
            <span class="info-tip" title="公共节点有限速，如遇错误请切换到自定义 RPC">i</span>
          </label>
          <div class="field-stack">
            <label for="rpcSelect">选择节点</label>
            <select id="rpcSelect" name="rpcSelect">
              <option value="https://mainnet.helius-rpc.com/?api-key=899d8ca2-8066-46a0-830c-c9dc71685fba">Helius 公共节点</option>
              <option value="custom">自定义 RPC URL...</option>
            </select>
          </div>
          <div id="customRpcRow" class="field-stack" style="display:none; margin-top: 12px;">
            <label for="rpcUrl">自定义 URL</label>
            <input id="rpcUrl" name="rpcUrl" placeholder="https://mainnet.helius-rpc.com/?api-key=你的KEY" />
          </div>
          <span class="field-note">公共节点免费但有限速，如频繁出错请切换到你的付费 RPC（Helius/QuickNode/Alchemy 等填入自定义 URL）。</span>
        </div>

        <div class="field-block">
          <label class="field-label-row" for="hashInput">
            <span>交易哈希 <span class="lbl-en">(Transaction Hashes)</span></span>
            <span class="info-tip" title="每行一个哈希，或用逗号、空格分隔">i</span>
          </label>
          <textarea id="hashInput" placeholder="请输入交易哈希（每行一个，或用逗号/空格分隔）

示例：
5x7gE...hash1
3k9fA...hash2"></textarea>
        </div>

        <div class="actions">
          <button type="submit" class="primary" id="queryBtn">批量查询</button>
          <button type="button" class="secondary" id="clearBtn">清空</button>
        </div>
      </form>

      <div id="status" class="status"></div>
      <div id="progress-wrap" class="progress-wrap"><div id="progress-bar" class="progress-bar"></div></div>
      <div id="summary"></div>
    </section>

    <section class="panel">
      <div class="result-toolbar">
        <div class="filter-control">
          <label for="filterSelect">结果筛选</label>
          <select id="filterSelect">
            <option value="all">显示全部</option>
            <option value="success">只看成功</option>
            <option value="failed">只看失败</option>
          </select>
        </div>
        <div id="displayCount" class="display-count">当前显示 0 条</div>
      </div>
      <div class="table-wrap">
        <table>
          <colgroup><col style="width: 15%;"><col style="width: 55%;"><col style="width: 30%;"></colgroup>
          <thead>
            <tr>
              <th>区块号</th>
              <th>哈希缩写</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody id="result-body">
            <tr><td colspan="3" class="empty">还没有查询结果。</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
<script>
const RPC_TIMEOUT_MS = 45000;
const form = document.getElementById("query-form");
const queryBtn = document.getElementById("queryBtn");
const clearBtn = document.getElementById("clearBtn");
const statusEl = document.getElementById("status");
const progressWrapEl = document.getElementById("progress-wrap");
const progressBarEl = document.getElementById("progress-bar");
const summaryEl = document.getElementById("summary");
const resultBody = document.getElementById("result-body");
const rpcSelect = document.getElementById("rpcSelect");
const rpcUrlInput = document.getElementById("rpcUrl");
const customRpcRow = document.getElementById("customRpcRow");
const filterSelect = document.getElementById("filterSelect");
const displayCountEl = document.getElementById("displayCount");
let latestResults = [];

rpcSelect.addEventListener("change", () => {
  if (rpcSelect.value === "custom") {
    customRpcRow.style.display = "";
    rpcUrlInput.focus();
  } else {
    customRpcRow.style.display = "none";
    rpcUrlInput.value = "";
  }
});

filterSelect.addEventListener("change", () => {
  renderResults(latestResults);
});

let progressTimer = null;
let progressValue = 0;

function getRpcUrl() {
  if (rpcSelect.value === "custom") {
    const custom = rpcUrlInput.value.trim();
    if (custom) return custom;
  }
  return rpcSelect.value;
}

function setStatus(message, type) {
  if (!type) type = "";
  statusEl.textContent = message || "";
  statusEl.className = "status" + (type ? " " + type : "");
}

function startProgress() {
  progressValue = 6;
  progressBarEl.style.width = progressValue + "%";
  progressWrapEl.classList.add("show");
  if (progressTimer) clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    progressValue = Math.min(92, progressValue + (100 - progressValue) * 0.08);
    progressBarEl.style.width = progressValue + "%";
  }, 180);
}

function finishProgress() {
  if (progressTimer) {
    clearInterval(progressTimer);
    progressTimer = null;
  }
  progressValue = 100;
  progressBarEl.style.width = "100%";
  setTimeout(() => {
    progressWrapEl.classList.remove("show");
    progressBarEl.style.width = "0%";
  }, 260);
}

function renderSummary(data) {
  if (!data) {
    summaryEl.innerHTML = "";
    return;
  }
  const successRate = data.total > 0 ? ((data.success / data.total) * 100).toFixed(1) : 0;
  const failedRate = data.total > 0 ? ((data.failed / data.total) * 100).toFixed(1) : 0;
  summaryEl.innerHTML = '<div class="summary">' +
    '<div class="metric"><div class="label">查询总数</div><div class="value">' + data.total + '</div></div>' +
    '<div class="metric"><div class="label">成功 (' + successRate + '%)</div><div class="value">' + data.success + '</div></div>' +
    '<div class="metric"><div class="label">失败/未找到 (' + failedRate + '%)</div><div class="value">' + data.failed + '</div></div>' +
    '</div>';
}

function getFilteredResults(results) {
  const filter = filterSelect.value;
  if (filter === "success") return results.filter(result => result.status === "success");
  if (filter === "failed") return results.filter(result => result.status !== "success");
  return results;
}

function renderResults(results) {
  const source = results || [];
  const filtered = getFilteredResults(source);
  const filterText = filterSelect.options[filterSelect.selectedIndex].text;
  displayCountEl.textContent = "当前显示 " + filtered.length + " 条 / 总共 " + source.length + " 条（" + filterText + "）";
  if (source.length === 0) {
    resultBody.innerHTML = '<tr><td colspan="3" class="empty">还没有查询结果。</td></tr>';
    return;
  }
  if (filtered.length === 0) {
    resultBody.innerHTML = '<tr><td colspan="3" class="empty">当前筛选条件下没有结果。</td></tr>';
    return;
  }
  resultBody.innerHTML = filtered.map(result => {
    const hash = result.hash;
    const shortHash = hash.substring(0, 15);
    const isSuccess = result.status === "success";
    const statusClass = isSuccess ? "status-success" : "status-failed";
    const rowClass = isSuccess ? "row-success" : "row-failed";
    const statusText = isSuccess ? "成功" : "失败";
    const slot = result.slot || "N/A";
    return '<tr class="' + rowClass + '">' +
      '<td class="mono">' + slot + '</td>' +
      '<td class="mono"><a href="https://solscan.io/tx/' + hash + '" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none;" title="' + hash + '">' + shortHash + '..</a></td>' +
      '<td class="' + statusClass + '">' + statusText + '</td>' +
      '</tr>';
  }).join("");
}

async function querySignatureStatusesBatch(rpcUrl, hashes) {
  const BATCH_SIZE = 250;
  const allResults = [];
  for (let i = 0; i < hashes.length; i += BATCH_SIZE) {
    const batch = hashes.slice(i, i + BATCH_SIZE);
    const request = {
      jsonrpc: "2.0",
      id: 1,
      method: "getSignatureStatuses",
      params: [batch, { searchTransactionHistory: true }]
    };
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), RPC_TIMEOUT_MS);
    try {
      const response = await fetch(rpcUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(request),
        signal: controller.signal,
      });
      if (!response.ok) throw new Error("HTTP " + response.status);
      const data = await response.json();
      if (data.result && data.result.value) {
        const statuses = data.result.value;
        for (let j = 0; j < batch.length; j++) {
          const sigStatus = statuses[j];
          if (sigStatus) {
            const isFailed = sigStatus.err !== null;
            allResults.push({
              hash: batch[j],
              status: isFailed ? "failed" : "success",
              slot: sigStatus.slot,
              confirmations: sigStatus.confirmations,
              err: sigStatus.err
            });
          } else {
            allResults.push({
              hash: batch[j],
              status: "failed",
              slot: null,
              error: "Transaction not found"
            });
          }
        }
      } else {
        for (const hash of batch) {
          allResults.push({ hash: hash, status: "failed", slot: null, error: data.error ? JSON.stringify(data.error) : "RPC error" });
        }
      }
    } catch (e) {
      const msg = e.name === "AbortError" ? "请求超时" : e.message;
      for (const hash of batch) {
        allResults.push({ hash: hash, status: "failed", slot: null, error: msg });
      }
    } finally {
      clearTimeout(timeout);
    }
  }
  return allResults;
}

async function handleSubmit(event) {
  event.preventDefault();
  const input = document.getElementById("hashInput").value.trim();
  if (!input) {
    setStatus("请输入交易哈希", "error");
    return;
  }
  const hashes = input.split(/[\n,，\s]+/).map(h => h.trim()).filter(h => h);
  if (hashes.length === 0) {
    setStatus("请输入交易哈希", "error");
    return;
  }
  queryBtn.disabled = true;
  setStatus("正在查询 " + hashes.length + " 个交易（单次 RPC 请求）...", "loading");
  startProgress();
  try {
    const rpcUrl = getRpcUrl();
    const allResults = await querySignatureStatusesBatch(rpcUrl, hashes);
    latestResults = allResults;
    const successCount = allResults.filter(r => r.status === "success").length;
    const failedCount = allResults.length - successCount;
    renderSummary({ total: allResults.length, success: successCount, failed: failedCount });
    renderResults(latestResults);
    setStatus("查询完成，共 " + allResults.length + " 个交易，成功 " + successCount + " 个，失败/未找到 " + failedCount + " 个。");
  } catch (error) {
    latestResults = [];
    renderSummary(null);
    renderResults(latestResults);
    setStatus(error.message || "查询失败", "error");
  } finally {
    finishProgress();
    queryBtn.disabled = false;
  }
}

form.addEventListener("submit", handleSubmit);

clearBtn.addEventListener("click", () => {
  document.getElementById("hashInput").value = "";
  latestResults = [];
  filterSelect.value = "all";
  renderSummary(null);
  renderResults(latestResults);
  setStatus("");
});
</script>
</body>
</html>
